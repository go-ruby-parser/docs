site_name: go-ruby-parser docs
site_description: "A pure-Go (CGO=0) Ruby front-end — lexer, parser and AST — for building Ruby tooling in Go without cgo or Prism."
site_url: https://go-ruby-parser.github.io/docs/
repo_url: https://github.com/go-ruby-parser/parser
repo_name: go-ruby-parser/parser
edit_uri: ""

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

extra:
  version:
    provider: mike
    default: latest

nav:
  - Home: index.md
  - Grammar & limitations: grammar.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
